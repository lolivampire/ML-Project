# prometheus/alert_rules.yml
groups:
  - name: dss_api_alerts
    rules:
      # Peringatan 1: Server Mati Total
      - alert: ApiInstanceDown
        expr: up{job="fastapi_app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance API mati (Target: {{ $labels.instance }})"
          description: "Prometheus gagal menghubungi endpoint /metrics FastAPI selama lebih dari 1 menit."

      # Peringatan 2: Lonjakan Error 500 (Internal Server Error)
      - alert: HighErrorRate
        expr: sum(rate(http_request_duration_seconds_count{status_code=~"4..|5.."}[1m])) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Lonjakan Error 500 terdeteksi"
          description: "Terdapat lebih dari 5% error HTTP 500 dalam 1 menit terakhir. Segera cek Jaeger untuk melihat trace-nya!"

      # Peringatan 3: Latensi Prediksi ML Melambat
      - alert: SlowMachineLearningComputation
        expr: histogram_quantile(0.95, sum(rate(prediction_latency_seconds_bucket[5m])) by (le)) > 6.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Komputasi ML melambat (> 6 detik)"
          description: "P95 latensi untuk prediksi ML memakan waktu lebih dari 6 detik selama 2 menit berturut-turut."