services:
  # 1. Database PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: dss_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: dss_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dss_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d dss_database"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Aplikasi Utama FastAPI
  api:
    build: .
    container_name: dss_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:password123@db:5432/dss_database
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - REDIS_URL=redis://redis:6379/0 
    depends_on:
      db:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - dss_network
    # Healthcheck wajib ditambahkan agar Streamlit tahu kapan API siap menerima request
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Jaeger (Tracing)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: dss_jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317"
    networks:
      - dss_network

  # 4. Prometheus (Metrics TSDB)
  prometheus:
    image: prom/prometheus:latest
    container_name: dss_prometheus
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - dss_network
    depends_on:
      - api

  # 5. Alertmanager (Sistem Peringatan)
  alertmanager:
    image: prom/alertmanager:latest
    container_name: dss_alertmanager
    volumes:
      - ./alertmanager:/etc/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    ports:
      - "9093:9093"
    networks:
      - dss_network

  # 6. Grafana (Visualisasi)
  grafana:
    image: grafana/grafana:latest
    container_name: dss_grafana
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    networks:
      - dss_network
    depends_on:
      - prometheus

  # 7. Antarmuka Pengguna (Streamlit)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: dss_frontend
    ports:
      - "8501:8501"
    networks:
      - dss_network
    depends_on:
      api:
        condition: service_healthy

  # 8. Redis
  redis:
    image: redis:7-alpine
    container_name: dss_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - dss_network
    volumes:
      - redis_data:/data
    # Command ini mengoptimalkan Redis sebagai mesin caching data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru

networks:
  dss_network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  redis_data: