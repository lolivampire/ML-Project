# docker-compose.yml
version: '3.8'

services:
  # 1. Database PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: dss_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: dss_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dss_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d dss_database"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Aplikasi Utama FastAPI
  api:
    build: .
    container_name: dss_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:password123@db:5432/dss_database
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317 # Arahkan OTel ke container Jaeger
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dss_network

  # 3. Jaeger (Tracing)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: dss_jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Web UI
      - "4317:4317"   # OTLP gRPC receiver
    networks:
      - dss_network

  # 4. Prometheus (Metrics TSDB)
  prometheus:
    image: prom/prometheus:latest
    container_name: dss_prometheus
    volumes:
      - ./prometheus:/etc/prometheus # Mount folder konfigurasi lokal
      - prometheus_data:/prometheus  # Mount storage persisten
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090" # Web UI & API
    networks:
      - dss_network
    depends_on:
      - api

  # 5. Alertmanager (Sistem Peringatan)
  alertmanager:
    image: prom/alertmanager:latest
    container_name: dss_alertmanager
    volumes:
      - ./alertmanager:/etc/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    ports:
      - "9093:9093" # Web UI
    networks:
      - dss_network

  # 6. Grafana (Visualisasi)
  grafana:
    image: grafana/grafana:latest
    container_name: dss_grafana
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning # Auto-setup datasource & dashboard
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Password login Grafana
    ports:
      - "3000:3000" # Web UI
    networks:
      - dss_network
    depends_on:
      - prometheus

# Definisi Virtual Network agar semua container bisa saling panggil via nama service
networks:
  dss_network:
    driver: bridge

# Definisi Persistent Volumes agar data tidak hilang saat container direstart
volumes:
  postgres_data:
  prometheus_data:
  grafana_data: